    <script>
        (function() {
            // 1. Comment
            const targetUrl = "https://casamiga.github.io/THEATRE-FESTIVAL-2027/";
            
            // 2. Comment
            const urlParams = new URLSearchParams(window.location.search);
            
            // 3. Comment
            // Comment
            const savedUid = localStorage.getItem('user_uid');
            if (!urlParams.has('uid') && savedUid) {
                urlParams.set('uid', savedUid);
            }

            // 4. Comment
            const savedLang = localStorage.getItem('selectedLanguage');
            if (!urlParams.has('lang') && savedLang) {
                urlParams.set('lang', savedLang);
            }

            // 5. Comment
            // Comment
            if (!urlParams.has('utm_source')) {
                urlParams.set('utm_source', 'site_2026'); // Comment
                urlParams.set('utm_medium', 'auto_redirect'); // Comment
            } else {
                // Comment
                const currentContent = urlParams.get('utm_content') || '';
                urlParams.set('utm_content', (currentContent ? currentContent + '_' : '') + 'from_2026');
            }

            // Comment
            urlParams.set('redirect_v', '2026_to_2027');

            // 6. Comment
            const finalUrl = targetUrl + (urlParams.toString() ? '?' + urlParams.toString() : '');
            
            // 7. Comment
            // Comment
            window.location.replace(finalUrl);
        })();
    </script>
